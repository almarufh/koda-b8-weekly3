name: Publish App
run-name: ${{github.event.head_commit.message}}
on:
  push:
    tags:
      - v*
jobs:
  get-source-code:
    name: "Get source code project"
    runs-on: ubuntu-latest
    outputs:
      output: ${{ steps.upload-source.outputs.artifact-id }}
    steps:
      - name: Get source code
        uses: actions/checkout@v7
      - name: Build image
        run: docker build -t ghcr.io/${{github.actor}}/auth-app:latest .
      - name: Login to ghcr.io
        run: echo -n ${{secrets.GITHUB_TOKEN}} | docker login ghcr.io --username ${{github.actor}} --password-stdin
      - name: Push image to ghcr
        run: docker push ghcr.io/${{github.actor}}/auth-app:latest
      - name: Compress files dist from artifact
        run: zip -r ./auth-app-${{ github.ref_name }}.zip ./ghcr.io/${{github.actor}}/auth-app:latest
      - name: Release to Github
        uses: softprops/action-gh-release@v3
        with:
          files: |
            auth-app-${{ github.ref_name }}.zip
 